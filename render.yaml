# Render configuration for Shuby production.
#
# Note: this file documents the desired state. Actual prod config lives on
# the Render Dashboard (Blueprint sync is NOT enabled). Keep this in sync
# manually when tweaking the Dashboard so it stays a useful reference /
# starter template in case Blueprint sync is ever turned on.
#
# Single-Postgres setup: Rails uses one shuby-db for every logical DB
# (primary, queue, cache, cable). See config/database.yml — in production
# CACHE_DATABASE_URL / QUEUE_DATABASE_URL / CABLE_DATABASE_URL all fall
# back to DATABASE_URL when unset, so we only need to inject DATABASE_URL.
services:
  - type: web
    name: shuby-ruby
    plan: standard # Starter 512MB non basta per Rails 8 + Jumpstart + RubyLLM
    runtime: ruby
    region: frankfurt # must match DB region for internal connection strings
    buildCommand: "./bin/render-build.sh"
    startCommand: bundle exec rails s
    healthCheckPath: "/up"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 0 # single-mode Puma (no master fork); see config/puma.rb
      - key: DATABASE_URL
        fromDatabase:
          name: shuby-db
          property: connectionString

  # Dedicated SolidQueue worker — runs supervisor/dispatcher/workers
  # outside the Puma process so the web baseline stays lean.
  # Start command is `bin/jobs` (already in Procfile).
  - type: worker
    name: solid-queue-worker
    runtime: ruby
    plan: starter # SolidQueue is lightweight; scale up only if jobs become heavy
    region: frankfurt
    buildCommand: "./bin/render-build.sh --skip-migrations"
    startCommand: bundle exec bin/jobs
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: shuby-db
          property: connectionString

# The shuby-db Postgres instance is managed via the Render Dashboard
# (PostgreSQL 16, Frankfurt). Intentionally not declared here to avoid a
# Blueprint apply from trying to create a duplicate.
