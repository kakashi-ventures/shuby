# Example Render configuration. You will need to adjust this for the different services you run.
services:
  - type: web
    name: rails
    plan: standard # Starter 512MB è sotto il fabbisogno (Rails 8 + Jumpstart + RubyLLM)
    runtime: ruby
    region: frankfurt # the region must be consistent across all services for the internal keys to be read
    buildCommand: "./bin/render-build.sh"
    startCommand: bundle exec rails s
    healthCheckPath: "/up"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      # SolidQueue runs in a dedicated worker service below — keep it out of the web process
      # to avoid tying 80–150 MB of supervisor/dispatcher/worker memory to the Puma baseline.
      - key: WEB_CONCURRENCY
        value: 0 # single-mode Puma (no master fork); see config/puma.rb
      - key: DATABASE_URL
        fromDatabase:
          name: primary
          property: connectionString
      - key: CABLE_DATABASE_URL
        fromDatabase:
          name: solid_cable
          property: connectionString
      - key: CACHE_DATABASE_URL
        fromDatabase:
          name: solid_cache
          property: connectionString
      - key: QUEUE_DATABASE_URL
        fromDatabase:
          name: solid_queue
          property: connectionString
      # Uncomment the following config if you want to use Redis
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: redis
      #     property: connectionString

  # Uncomment the following blueprint if you want to use Redis
  # - type: redis
  #   name: redis
  #   region: oregon # the region must be consistent across all services for the internal keys to be read
  #   ipAllowList: [] # only allow internal connections
  #   plan: free # optional (defaults to starter)
  #   maxmemoryPolicy: noeviction # optional (defaults to allkeys-lru)

  # Dedicated SolidQueue worker — keeps job supervisor/dispatcher/workers
  # out of the Puma process so the web baseline stays lean.
  # Start command is `bin/jobs` (already in Procfile), which runs the SolidQueue supervisor.
  - type: worker
    name: solid-queue-worker
    runtime: ruby
    plan: starter
    region: frankfurt # must match the web service region for internal DB connections
    buildCommand: "./bin/render-build.sh --skip-migrations"
    startCommand: bundle exec bin/jobs
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: primary
          property: connectionString
      - key: QUEUE_DATABASE_URL
        fromDatabase:
          name: solid_queue
          property: connectionString
      - key: CACHE_DATABASE_URL
        fromDatabase:
          name: solid_cache
          property: connectionString
      - key: CABLE_DATABASE_URL
        fromDatabase:
          name: solid_cable
          property: connectionString

# Render's "free" databases are deleted after 30 days unless upgraded and only one per workspace. Instead, default to the smallest paid size.
databases:
  - name: primary
    plan: basic-256mb
    region: frankfurt # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections

  - name: solid_cable
    plan: basic-256mb
    region: frankfurt # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections

  - name: solid_cache
    plan: basic-256mb
    region: frankfurt # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections

  - name: solid_queue
    plan: basic-256mb
    region: frankfurt # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections
