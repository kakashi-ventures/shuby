# frozen_string_literal: true

# In-progress session for testing (motricita month 0)
in_progress_session:
  child: sophia
  age_band_questionnaire: motricita_month_0
  status: 1
  started_at: <%= 1.day.ago %>
  child_age_months: 0

# Completed session for testing (comunicazione month 0)
completed_session:
  child: sophia
  age_band_questionnaire: comunicazione_month_0
  status: 2
  started_at: <%= 3.days.ago %>
  completed_at: <%= 2.days.ago %>
  child_age_months: 0

# Not started session
not_started_session:
  child: sophia
  age_band_questionnaire: relazione_month_0
  status: 0
  child_age_months: 0

# Session with attention needed (many "no" answers) - will have responses attached
attention_needed_session:
  child: sophia
  age_band_questionnaire: cognizione_month_0
  status: 2
  started_at: <%= 5.days.ago %>
  completed_at: <%= 4.days.ago %>
  child_age_months: 0

# Past in-progress session (month 1, sophia is ~2 months) - for skip logic tests
past_in_progress_session:
  child: sophia
  age_band_questionnaire: comunicazione_month_1
  status: 1
  started_at: <%= 2.weeks.ago %>
  child_age_months: 1

# Past not-started session (month 1, sophia is ~2 months) - for cleanup tests
past_not_started_session:
  child: sophia
  age_band_questionnaire: consolidamento_month_1
  status: 0
  child_age_months: 1
