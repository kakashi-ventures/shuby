app:
  mode: normal
  entry_path: /
  # Portrait-only is the Ruby Native default. Do NOT add `landscape: true` —
  # Shuby is designed mobile-portrait at 320–430px; landscape layouts are not
  # in Figma and are explicitly out of scope.

appearance:
  tint_color: "#0159B5"
  background_color:
    light: "#FFFFFF"
    dark: "#1F2937"
  theme: auto

tabs:
  - title: Oggi
    path: /today
    icon: house.fill
    auto_route:
      - /today
      # NOTE: /children/ removed 2026-04-21 — it appeared to trigger a
      # Ruby Native 0.7 iOS interceptor that cancelled turbo:before-visit
      # on links into child-scoped URLs (stuck click, no visit, no fetch).
      # Tradeoff: tapping a /children/* link from Archivio/Gestione no
      # longer auto-switches to Oggi — navigation stays in the current
      # tab. Acceptable for now; can re-enable once upstream confirms.
  - title: Shuby AI
    path: /shuby
    icon: bubble.left.and.text.bubble.right.fill
    eager: true
  - title: Archivio
    path: /archive
    icon: books.vertical.fill
  - title: Gestione
    path: /settings
    icon: gearshape.fill
