app:
  mode: normal
  entry_path: /
  # Portrait-only is the Ruby Native default. Do NOT add `landscape: true` —
  # Shuby is designed mobile-portrait at 320–430px; landscape layouts are not
  # in Figma and are explicitly out of scope.

appearance:
  tint_color: "#0159B5"
  background_color:
    light: "#FFFFFF"
    dark: "#1F2937"
  theme: auto

tabs:
  - title: Oggi
    path: /today
    icon: house.fill
    auto_route:
      - /today
      - /children/
  - title: Shuby AI
    path: /shuby
    icon: bubble.left.and.text.bubble.right.fill
    eager: true
  - title: Archivio
    path: /archive
    icon: books.vertical.fill
  - title: Gestione
    path: /settings
    icon: gearshape.fill

# Linked domains (gem ≥0.10.0). Tapping an app.shuby.app link opens the iOS app
# instead of Safari, and lets the app share saved passwords with the site. The
# gem serves /.well-known/apple-app-site-association from these values and the
# linked domain is auto-derived from the request host (no domain key needed).
# team_id is NOT secret — it ships publicly in the AASA file as TEAMID.BUNDLEID
# — so it is kept here as a literal: ruby_native.yml is parsed with
# YAML.load_file, which has no ERB/credentials support.
# NOTE: requires an iOS binary rebuilt against this gem version so the
# associated-domains entitlement is baked in (run `ruby_native deploy`).
ios:
  bundle_id: app.shuby.rubynative
  team_id: "9R33QX48J7"
