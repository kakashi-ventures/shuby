production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  measurement_reminder_scan:
    class: Children::MeasurementReminderScanJob
    queue: default
    schedule: every day at 9am Europe/Rome
  milestone_reminder_scan:
    class: Children::MilestoneReminderScanJob
    queue: default
    schedule: every day at 9:15am Europe/Rome
  questionnaire_resume_scan:
    class: Children::QuestionnaireResumeScanJob
    queue: default
    schedule: every day at 9:30am Europe/Rome
  onboarding_nudge_scan:
    class: Users::OnboardingNudgeScanJob
    queue: default
    schedule: every day at 10am Europe/Rome
